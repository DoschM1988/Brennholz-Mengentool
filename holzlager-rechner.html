<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Holzlager-Rechner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #83B735;
    --primary-dark: #6a9a2a;
    --dark: #2F5D2F;
    --cream: #FCFAF5;
    --border: #dfe6d5;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 60px;
  }

  .logo {
    width: 100%;
    max-width: 260px;
    height: auto;
    margin-bottom: 18px;
  }

  h1 {
    font-size: 21px;
    font-weight: 700;
    margin-bottom: 4px;
    text-align: center;
    letter-spacing: -0.2px;
  }
  p.subtitle {
    color: #7a8a72;
    font-size: 13.5px;
    margin-bottom: 24px;
    text-align: center;
    max-width: 340px;
    line-height: 1.4;
  }

  .stack {
    background: white;
    border-radius: 18px;
    padding: 22px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 20px rgba(47,93,47,0.08);
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .stack-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .stack-header span {
    font-weight: 700;
    font-size: 15px;
    color: var(--dark);
  }
  .remove-btn {
    background: none;
    border: none;
    color: #b0574a;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .remove-btn:active { background: #fbe9e6; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #4a5a42;
  }
  .input-wrap {
    position: relative;
    margin-bottom: 14px;
  }
  input[type="number"] {
    width: 100%;
    padding: 13px 40px 13px 14px;
    font-size: 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--cream);
    color: var(--dark);
    transition: border-color 0.15s;
  }
  input[type="number"]:focus {
    outline: none;
    border-color: var(--primary);
  }
  .unit {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    color: #9aab8f;
    font-weight: 600;
    pointer-events: none;
  }

  .toggle-group {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
  }
  .toggle-btn {
    flex: 1;
    padding: 12px;
    font-size: 14px;
    font-weight: 700;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--cream);
    color: #8a9a80;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .toggle-btn.active {
    border-color: var(--primary);
    background: var(--primary);
    color: white;
  }

  .stack-result {
    margin-top: 16px;
    padding: 14px;
    background: linear-gradient(135deg, #eef5e2, #e7f2da);
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    color: var(--dark);
    text-align: center;
  }

  .add-btn {
    width: 100%;
    max-width: 400px;
    padding: 15px;
    font-size: 14.5px;
    font-weight: 700;
    background: white;
    color: var(--primary-dark);
    border: 2px dashed #b9d38f;
    border-radius: 14px;
    cursor: pointer;
    margin-bottom: 22px;
    transition: background 0.15s;
  }
  .add-btn:active { background: #f3f8ec; }

  .total {
    width: 100%;
    max-width: 400px;
    padding: 24px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 6px 24px rgba(131,183,53,0.3);
  }
  .total .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    opacity: 0.85;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .total .line { font-size: 30px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.5px; }
  .total .sub { font-size: 13px; opacity: 0.9; }

  .info {
    font-size: 11.5px;
    color: #9aab8f;
    text-align: center;
    margin-top: 18px;
    max-width: 380px;
    line-height: 1.5;
  }
</style>
</head>

<h1>Holzlager-Rechner</h1>
<p class="subtitle">Länge × Höhe des Stapels eingeben – Tiefe entspricht der Scheitlänge</p>

<div id="stacks"></div>

<button class="add-btn" onclick="addStack()">+ Weiteren Stapel hinzufügen</button>

<div class="total" id="total">
  <div class="label">Gesamtmenge</div>
  <div class="line">0,00 Ster</div>
  <div class="sub">aus 0 Stapeln</div>
</div>

<p class="info">Luftraum-Faktor je Scheitlänge: 33&nbsp;cm &rarr; 0,85 &middot; 25&nbsp;cm &rarr; 0,75.<br>Faustregel-Werte, keine geeichte Messung.</p>

<script>
let stackCount = 0;
const stacks = {};

function addStack() {
  stackCount++;
  const id = stackCount;
  stacks[id] = { laenge: 0, hoehe: 0, scheitlaenge: 0.33, faktor: 0.85 };

  const div = document.createElement('div');
  div.className = 'stack';
  div.id = 'stack-' + id;
  div.innerHTML = `
    <div class="stack-header">
      <span>Stapel ${id}</span>
      <button class="remove-btn" onclick="removeStack(${id})">Entfernen</button>
    </div>

    <label>Länge des Stapels</label>
    <div class="input-wrap">
      <input type="number" step="0.1" min="0" placeholder="z. B. 4" oninput="updateStack(${id}, 'laenge', this.value)">
      <span class="unit">m</span>
    </div>

    <label>Höhe des Stapels</label>
    <div class="input-wrap">
      <input type="number" step="0.1" min="0" placeholder="z. B. 1.8" oninput="updateStack(${id}, 'hoehe', this.value)">
      <span class="unit">m</span>
    </div>

    <label>Ofenlänge</label>
    <div class="toggle-group">
      <button class="toggle-btn active" id="btn33-${id}" onclick="setFaktor(${id}, 0.33, 0.85)">33 cm</button>
      <button class="toggle-btn" id="btn25-${id}" onclick="setFaktor(${id}, 0.25, 0.75)">25 cm</button>
    </div>

    <div class="stack-result" id="result-${id}">0,00 Ster</div>
  `;
  document.getElementById('stacks').appendChild(div);
  calculateTotal();
}

function removeStack(id) {
  delete stacks[id];
  const el = document.getElementById('stack-' + id);
  if (el) el.remove();
  calculateTotal();
}

function updateStack(id, field, value) {
  stacks[id][field] = parseFloat(value) || 0;
  calculateStack(id);
  calculateTotal();
}

function setFaktor(id, scheitlaenge, faktor) {
  stacks[id].scheitlaenge = scheitlaenge;
  stacks[id].faktor = faktor;
  document.getElementById('btn33-' + id).classList.toggle('active', scheitlaenge === 0.33);
  document.getElementById('btn25-' + id).classList.toggle('active', scheitlaenge === 0.25);
  calculateStack(id);
  calculateTotal();
}

function calculateStack(id) {
  const s = stacks[id];
  const ster = s.laenge * s.hoehe * s.scheitlaenge * s.faktor;
  document.getElementById('result-' + id).textContent = ster.toFixed(2).replace('.', ',') + ' Ster';
  return ster;
}

function calculateTotal() {
  let total = 0;
  let count = 0;
  for (const id in stacks) {
    total += calculateStack(id);
    count++;
  }
  document.querySelector('#total .line').textContent = total.toFixed(2).replace('.', ',') + ' Ster';
  document.querySelector('#total .sub').textContent = 'aus ' + count + ' Stapel' + (count === 1 ? '' : 'n');
}

addStack();
</script>

</body>
</html>
