<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Belegerfassung Maschinenring</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #83B735;
    --green-dark: #2F5D2F;
    --cream: #FCFAF5;
    --line: #E3E0D6;
    --text: #263427;
    --muted: #7A8577;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, Segoe UI, Arial, sans-serif;
    background: var(--cream);
    margin: 0;
    padding: 28px 16px;
    color: var(--text);
  }
  .wrap { max-width: 1180px; margin: 0 auto; }

  .head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 22px;
  }
  .head h1 {
    font-size: 22px;
    font-weight: 800;
    color: var(--green-dark);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .head span {
    display: block;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--muted);
    margin-top: 2px;
  }
  .toolbar { display: flex; gap: 10px; align-items: center; }
  .mwst-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    padding: 4px;
    margin-right: 4px;
  }
  .mwst-toggle button {
    background: transparent;
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
  }
  .mwst-toggle button.active {
    background: var(--green-dark);
    color: #fff;
  }
  button {
    font-family: inherit;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .08s ease, background .15s ease;
  }
  button:active { transform: scale(0.97); }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-secondary { background: #fff; color: var(--green-dark); border: 1.5px solid var(--line); }
  .btn-secondary:hover { border-color: var(--green); }

  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px 16px;
    margin-bottom: 14px;
    box-shadow: 0 1px 2px rgba(47,93,47,0.04);
    position: relative;
  }
  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .beleg-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--green-dark);
    color: #fff;
    font-weight: 700;
    font-size: 12.5px;
    padding: 5px 12px 5px 10px;
    border-radius: 999px;
  }
  .beleg-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

  .del {
    background: none;
    border: none;
    color: #B94A3B;
    font-size: 12.5px;
    font-weight: 600;
    padding: 4px 6px;
    cursor: pointer;
    border-radius: 6px;
  }
  .del:hover { background: #fdeceb; }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px 16px;
  }
  .field { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .field.span2 { grid-column: span 2; }
  .field.span4 { grid-column: span 4; }
  textarea {
    font-family: inherit;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13.5px;
    color: var(--text);
    background: var(--cream);
    width: 100%;
    resize: vertical;
    min-height: 42px;
  }
  textarea:focus {
    outline: none;
    border-color: var(--green);
    background: #fff;
  }
  label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
  }
  input, select {
    font-family: inherit;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13.5px;
    color: var(--text);
    background: var(--cream);
    width: 100%;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--green);
    background: #fff;
  }
  .num { text-align: right; }
  .check-field {
    flex-direction: row;
    align-items: center;
    gap: 8px;
    padding-top: 20px;
  }
  input[type=checkbox] {
    width: 17px; height: 17px; accent-color: var(--green); cursor: pointer;
  }
  .check-field label { text-transform: none; font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0; }

  .summary {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 28px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 20px;
    margin-top: 6px;
  }
  .summary .sum-block { text-align: right; }
  .summary .label { font-size: 12px; font-weight: 600; color: var(--muted); display: block; }
  .summary .value { font-size: 20px; font-weight: 800; color: var(--green-dark); }
  .summary .value.main { font-size: 22px; }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 13.5px;
    padding: 40px 0;
    border: 1.5px dashed var(--line);
    border-radius: 14px;
  }

  .send-box {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
    margin-top: 14px;
  }
  .send-box h2 {
    font-size: 14px;
    font-weight: 800;
    color: var(--green-dark);
    margin: 0 0 10px;
  }
  #summaryList {
    font-size: 12.5px;
    color: var(--text);
    margin: 0 0 14px;
    padding: 0;
    list-style: none;
  }
  #summaryList li {
    padding: 6px 0;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    gap: 10px;
  }
  #summaryList li:last-child { border-bottom: none; }
  #summaryList .s-desc { color: var(--muted); }
  #summaryList .s-price { font-weight: 700; color: var(--green-dark); white-space: nowrap; }
  .send-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .send-row .to {
    font-size: 12px;
    color: var(--muted);
  }
  .send-row .to b { color: var(--text); }

  @media (max-width: 820px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .field.span2 { grid-column: span 2; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <div>
      <h1>Belegerfassung</h1>
      <span>Maschinenring &middot; laufende Erfassung</span>
    </div>
    <div class="toolbar">
      <div class="mwst-toggle">
        <button type="button" id="btn-netto" class="active" onclick="setMode('netto')">Netto</button>
        <button type="button" id="btn-brutto" onclick="setMode('brutto')">Brutto</button>
      </div>
      <button class="btn-secondary" onclick="exportCSV()">CSV exportieren</button>
      <button class="btn-primary" onclick="addBeleg()">+ Neuer Beleg</button>
    </div>
  </div>

  <div id="list"></div>
  <div id="emptyState" class="empty" style="display:none;">Noch kein Beleg erfasst — leg mit „+ Neuer Beleg" los.</div>

  <div class="summary">
    <div class="sum-block">
      <span class="label">Nettosumme</span>
      <span class="value" id="nettosumme">0,00 €</span>
    </div>
    <div class="sum-block">
      <span class="label">MwSt. (19%)</span>
      <span class="value" id="mwstsumme">0,00 €</span>
    </div>
    <div class="sum-block">
      <span class="label">Bruttosumme</span>
      <span class="value main" id="bruttosumme">0,00 €</span>
    </div>
  </div>

  <div class="send-box">
    <h2>Zusammenfassung</h2>
    <ul id="summaryList"></ul>
    <div class="send-row">
      <span class="to">Wird gesendet an: <b>info@mr-starnberg.de</b></span>
      <button class="btn-primary" onclick="sendMail()">An Maschinenring senden</button>
    </div>
  </div>

</div>

<script>
let counter = 0;
let mode = 'netto'; // 'netto' oder 'brutto' -- bestimmt, wie eingegebene Preise interpretiert werden
const MWST = 0.19;

function setMode(newMode) {
  mode = newMode;
  document.getElementById('btn-netto').classList.toggle('active', mode === 'netto');
  document.getElementById('btn-brutto').classList.toggle('active', mode === 'brutto');
  const suffix = mode === 'netto' ? '(Netto)' : '(Brutto)';
  document.querySelectorAll('.lbl-einzelpreis').forEach(l => l.textContent = `Einzelpreis ${suffix} (€)`);
  document.querySelectorAll('.lbl-gesamtpreis').forEach(l => l.textContent = `Gesamtpreis ${suffix} (€)`);
  updateSum();
}

function addBeleg() {
  counter++;
  const uid = counter;
  const nr = document.querySelectorAll('.card').length + 1;
  const list = document.getElementById('list');
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = uid;
  card.innerHTML = `
    <div class="card-top">
      <span class="beleg-badge"><span class="dot"></span>Beleg Nr. ${nr}</span>
      <button class="del" onclick="delCard(this)">Löschen ✕</button>
    </div>
    <div class="grid">
      <div class="field">
        <label>Auftraggeber (AG)</label>
        <input type="text" class="ag" placeholder="Name / Mitglied">
      </div>
      <div class="field">
        <label>Auftragnehmer (AN)</label>
        <input type="text" class="an" placeholder="Name / Mitglied">
      </div>
      <div class="field">
        <label>Leistungsdatum</label>
        <input type="date" class="datum">
      </div>
      <div class="field">
        <label>VSKZ-Nr.</label>
        <input type="text" class="vskz" placeholder="VSKZ-Nr.">
      </div>
      <div class="field span2">
        <label>Leistung</label>
        <input type="text" class="leistung" placeholder="z. B. Häckseln, Mähen, Transport ...">
      </div>
      <div class="field">
        <label>Umfang</label>
        <input type="number" step="0.01" class="umfang" oninput="calc(this)" placeholder="Menge / Std.">
      </div>
      <div class="field">
        <label class="lbl-einzelpreis">Einzelpreis ${mode === 'netto' ? '(Netto)' : '(Brutto)'} (€)</label>
        <input type="number" step="0.01" class="einzelpreis num" oninput="calc(this)" placeholder="0,00">
      </div>
      <div class="field">
        <label class="lbl-gesamtpreis">Gesamtpreis ${mode === 'netto' ? '(Netto)' : '(Brutto)'} (€)</label>
        <input type="number" step="0.01" class="gesamtpreis num" oninput="calcBack(this)" placeholder="0,00">
      </div>
      <div class="field check-field">
        <input type="checkbox" class="agtank" id="agtank-${counter}">
        <label for="agtank-${counter}">AG getankt</label>
      </div>
      <div class="field span4">
        <label>Bemerkung</label>
        <textarea class="bemerkung" placeholder="Zusätzliche Hinweise ..."></textarea>
      </div>
    </div>
  `;
  list.appendChild(card);
  updateEmptyState();
}

function renumberBelege() {
  document.querySelectorAll('.card').forEach((card, i) => {
    const nr = i + 1;
    card.querySelector('.beleg-badge').innerHTML = `<span class="dot"></span>Beleg Nr. ${nr}`;
  });
}

function calc(el) {
  const card = el.closest('.card');
  const umfang = parseFloat(card.querySelector('.umfang').value) || 0;
  const einzel = parseFloat(card.querySelector('.einzelpreis').value) || 0;
  if (umfang && einzel) {
    card.querySelector('.gesamtpreis').value = (umfang * einzel).toFixed(2);
  }
  updateSum();
}

function calcBack(el) {
  const card = el.closest('.card');
  const umfang = parseFloat(card.querySelector('.umfang').value) || 0;
  const gesamt = parseFloat(card.querySelector('.gesamtpreis').value) || 0;
  if (umfang && gesamt) {
    card.querySelector('.einzelpreis').value = (gesamt / umfang).toFixed(2);
  }
  updateSum();
}

function updateSum() {
  let sum = 0;
  document.querySelectorAll('.gesamtpreis').forEach(f => sum += parseFloat(f.value) || 0);

  let netto, brutto;
  if (mode === 'netto') {
    netto = sum;
    brutto = sum * (1 + MWST);
  } else {
    brutto = sum;
    netto = sum / (1 + MWST);
  }
  const mwst = brutto - netto;

  document.getElementById('nettosumme').textContent = fmtEUR(netto);
  document.getElementById('mwstsumme').textContent = fmtEUR(mwst);
  document.getElementById('bruttosumme').textContent = fmtEUR(brutto);

  updateSummaryList();
}

function fmtEUR(v) {
  return (parseFloat(v) || 0).toLocaleString('de-DE', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' €';
}

function updateSummaryList() {
  const list = document.getElementById('summaryList');
  list.innerHTML = '';
  document.querySelectorAll('.card').forEach(card => {
    const nr = card.querySelector('.beleg-badge').textContent.replace('Beleg Nr. ', '');
    const ag = card.querySelector('.ag').value || '–';
    const an = card.querySelector('.an').value || '–';
    const leistung = card.querySelector('.leistung').value || '–';
    const gesamt = card.querySelector('.gesamtpreis').value;
    const li = document.createElement('li');
    li.innerHTML = `<span class="s-desc">#${nr} · ${ag} → ${an} · ${leistung}</span><span class="s-price">${fmtEUR(gesamt)}</span>`;
    list.appendChild(li);
  });
}

function sendMail() {
  const cards = document.querySelectorAll('.card');
  if (cards.length === 0) {
    alert('Es sind noch keine Belege erfasst.');
    return;
  }
  const modeLabel = mode === 'netto' ? 'Netto' : 'Brutto';
  let body = `Belegübersicht Maschinenring (Preise: ${modeLabel})\n\n`;
  let gesamt = 0;
  cards.forEach(card => {
    const nr = card.querySelector('.beleg-badge').textContent.replace('Beleg Nr. ', '');
    const ag = card.querySelector('.ag').value || '-';
    const an = card.querySelector('.an').value || '-';
    const datum = card.querySelector('.datum').value || '-';
    const vskz = card.querySelector('.vskz').value || '-';
    const leistung = card.querySelector('.leistung').value || '-';
    const umfang = card.querySelector('.umfang').value || '-';
    const einzel = card.querySelector('.einzelpreis').value;
    const preis = parseFloat(card.querySelector('.gesamtpreis').value) || 0;
    const agtank = card.querySelector('.agtank').checked ? 'ja' : 'nein';
    const bemerkung = card.querySelector('.bemerkung').value || '-';
    gesamt += preis;
    body += `Beleg Nr. ${nr}\n`;
    body += `Auftraggeber (AG): ${ag}\n`;
    body += `Auftragnehmer (AN): ${an}\n`;
    body += `Leistungsdatum: ${datum}\n`;
    body += `VSKZ-Nr.: ${vskz}\n`;
    body += `Leistung: ${leistung}\n`;
    body += `Umfang: ${umfang}\n`;
    body += `Einzelpreis (${modeLabel}): ${fmtEUR(einzel)}\n`;
    body += `Gesamtpreis (${modeLabel}): ${fmtEUR(preis)}\n`;
    body += `AG getankt: ${agtank}\n`;
    body += `Bemerkung: ${bemerkung}\n\n`;
  });

  let netto, brutto;
  if (mode === 'netto') {
    netto = gesamt;
    brutto = gesamt * (1 + MWST);
  } else {
    brutto = gesamt;
    netto = gesamt / (1 + MWST);
  }
  body += `Nettosumme: ${fmtEUR(netto)}\n`;
  body += `MwSt. (19%): ${fmtEUR(brutto - netto)}\n`;
  body += `Bruttosumme: ${fmtEUR(brutto)}\n`;

  const subject = encodeURIComponent('Belegübersicht Maschinenring');
  const mailto = `mailto:info@mr-starnberg.de?subject=${subject}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
}

function delCard(btn) {
  btn.closest('.card').remove();
  renumberBelege();
  updateSum();
  updateEmptyState();
}

function updateEmptyState() {
  const has = document.querySelectorAll('.card').length > 0;
  document.getElementById('emptyState').style.display = has ? 'none' : 'block';
}

function exportCSV() {
  const modeLabel = mode === 'netto' ? 'Netto' : 'Brutto';
  const rows = [['Beleg-Nr','Auftraggeber (AG)','Auftragnehmer (AN)','Leistungsdatum','VSKZ-Nr','Leistung','Umfang',`Einzelpreis (${modeLabel})`,`Gesamtpreis (${modeLabel})`,'AG getankt','Bemerkung']];
  let gesamt = 0;
  document.querySelectorAll('.card').forEach(card => {
    const preis = parseFloat(card.querySelector('.gesamtpreis').value) || 0;
    gesamt += preis;
    rows.push([
      card.querySelector('.beleg-badge').textContent.replace('Beleg Nr. ', ''),
      card.querySelector('.ag').value,
      card.querySelector('.an').value,
      card.querySelector('.datum').value,
      card.querySelector('.vskz').value,
      card.querySelector('.leistung').value,
      card.querySelector('.umfang').value,
      card.querySelector('.einzelpreis').value,
      card.querySelector('.gesamtpreis').value,
      card.querySelector('.agtank').checked ? 'ja' : 'nein',
      card.querySelector('.bemerkung').value
    ]);
  });
  let netto, brutto;
  if (mode === 'netto') { netto = gesamt; brutto = gesamt * (1 + MWST); }
  else { brutto = gesamt; netto = gesamt / (1 + MWST); }
  rows.push([]);
  rows.push(['', '', '', '', '', '', '', '', 'Nettosumme', fmtEUR(netto)]);
  rows.push(['', '', '', '', '', '', '', '', 'MwSt. (19%)', fmtEUR(brutto - netto)]);
  rows.push(['', '', '', '', '', '', '', '', 'Bruttosumme', fmtEUR(brutto)]);
  const csv = rows.map(r => r.map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob = new Blob(['\ufeff' + csv], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'belege.csv';
  link.click();
}

addBeleg();
</script>
</body>
</html>
